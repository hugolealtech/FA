<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Functus - Prince of Darkness Edition</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        /* * =========================================
         * CSS VARIABLES & THEME CONFIGURATION BOBA FETT STYLE
         * =========================================
         */
        :root {
            --bg-body: #ece9e6; --bg-gradient: linear-gradient(to right, #ece9e6, #ffffff);
            --glass-bg: rgba(255, 255, 255, 0.90); --glass-border: rgba(255, 255, 255, 0.6);
            --text-main: #1e293b; --text-light: #64748b; --card-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            --primary: #2563eb; --secondary: #64748b; --accent: #f59e0b; --danger: #ef4444; 
            --success: #10b981; --info: #0ea5e9; --dark: #0f172a; --boleto: #475569;
        }
        [data-theme="dark"] {
            --bg-body: #0f172a; --bg-gradient: linear-gradient(to right, #0f172a, #1e293b);
            --glass-bg: rgba(30, 41, 59, 0.85); --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f1f5f9; --text-light: #94a3b8; --card-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        }

        /* GLOBAL RESET */
        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-gradient); color: var(--text-main); margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; transition: background 0.3s, color 0.3s; }

        /* HEADER & LAYOUT */
        header { background: var(--glass-bg); backdrop-filter: blur(10px); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border); z-index: 100; flex-wrap: wrap; gap: 10px; }
        h1 { margin: 0; font-size: 1.5rem; font-weight: 800; color: var(--primary); letter-spacing: -1px; display: flex; align-items: center; gap: 10px; }
        .badge-v3 { background: var(--accent); color: white; padding: 2px 8px; border-radius: 6px; font-size: 0.7rem; text-transform: uppercase; }
        main { flex: 1; padding: 1rem; overflow-y: auto; max-width: 1200px; margin: 0 auto; width: 100%; }

        /* COMPONENTS */
        .glass-panel { background: var(--glass-bg); box-shadow: var(--card-shadow); backdrop-filter: blur(8px); border-radius: 20px; border: 1px solid var(--glass-border); padding: 1.5rem; margin-bottom: 1.5rem; transition: transform 0.2s ease, background 0.3s; }
        .row { display: flex; flex-wrap: wrap; gap: 20px; }
        .col { flex: 1; min-width: 300px; }
        .hidden { display: none !important; }

        /* BUTTONS */
        .btn { padding: 10px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; font-size: 0.9rem; }
        .btn-sm { padding: 6px 12px; font-size: 0.8rem; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-info { background: var(--info); color: white; }
        .btn-gold { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; }
        .btn-ghost { background: transparent; color: var(--text-main); border: 1px solid var(--text-light); }
        .btn-danger-pulse { background: var(--danger); color: white; animation: pulse 2s infinite; }
        .btn-dark { background: var(--dark); color: white; }

        /* MEDIDOR DE ARMAZENAMENTO (NOVO) */
        .storage-pill {
            display: flex; align-items: center; gap: 8px; padding: 6px 12px; 
            border-radius: 20px; font-size: 0.8rem; font-weight: bold;
            background: rgba(0,0,0,0.05); border: 1px solid var(--glass-border);
            transition: all 0.3s; cursor: help;
        }
        .storage-pill.warning { background: var(--accent); color: white; }
        .storage-pill.critical { background: var(--danger); color: white; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* CARDS, CHARTS & UTILS */
        .nav-container { background: var(--glass-bg); padding: 5px; border-radius: 50px; display: inline-flex; box-shadow: var(--card-shadow); margin-bottom: 20px; max-width: 100%; overflow-x: auto; white-space: nowrap; }
        .nav-tab { padding: 10px 25px; border-radius: 40px; cursor: pointer; font-weight: 600; font-size: 0.9rem; color: var(--text-light); transition: all 0.3s; display: flex; align-items: center; gap: 8px; }
        .nav-tab.active { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); }

        /* CREDIT CARDS V3 */
        .credit-card-v3 { height: 190px; width: 100%; border-radius: 16px; padding: 25px; color: white; display: flex; flex-direction: column; justify-content: space-between; position: relative; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.4); transition: transform 0.3s, box-shadow 0.3s; font-family: 'Share Tech Mono', monospace; border: 1px solid rgba(255,255,255,0.1); }
        .credit-card-v3:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .credit-card-v3::before { content: ''; position: absolute; top: 0; left: 0; width: 200%; height: 200%; background: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.15) 0%, transparent 60%); pointer-events: none; }
        .card-status-badge { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; text-transform: uppercase; font-family: 'Inter', sans-serif; }
        .card-chip { width: 40px; height: 30px; background: linear-gradient(135deg, #fceabb 0%, #f8b500 100%); border-radius: 5px; margin-bottom: 10px; position: relative; overflow: hidden; border: 1px solid rgba(0,0,0,0.2); }
        .card-contactless { position: absolute; top: 60px; right: 20px; font-size: 1.5rem; opacity: 0.8; }
        .card-number { font-size: 1.4rem; letter-spacing: 2px; text-shadow: 0 2px 2px rgba(0,0,0,0.5); }
        .card-holder { text-transform: uppercase; font-size: 0.9rem; letter-spacing: 1px; }
        .card-meta-label { font-size: 0.6rem; opacity: 0.8; font-family: 'Inter', sans-serif; }

        /* SKINS */
        .skin-black { background: linear-gradient(135deg, #2b2b2b 0%, #000000 100%); }
        .skin-blue { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); }
        .skin-purple { background: linear-gradient(135deg, #8E2DE2 0%, #4A00E0 100%); }
        .skin-gold { background: linear-gradient(135deg, #CAC531 0%, #F3F9A7 100%); color: #4a3b10; text-shadow: none; }
        .skin-platinum { background: linear-gradient(135deg, #bdc3c7 0%, #2c3e50 100%); }
        .skin-boleto { background: linear-gradient(135deg, #475569 0%, #64748b 100%); } 

        /* PLANNER SCROLL */
        .planner-header { margin-bottom: 25px; overflow-x: hidden; }
        .cards-scroll-wrapper { display: flex; gap: 20px; overflow-x: auto; padding: 10px 5px 30px 5px; scroll-snap-type: x mandatory; }
        .cards-scroll-wrapper::-webkit-scrollbar { height: 6px; }
        .cards-scroll-wrapper::-webkit-scrollbar-thumb { background: var(--secondary); border-radius: 3px; }
        .planner-card-container { flex: 0 0 300px; scroll-snap-align: center; }
        .planner-card-actions { display: flex; gap: 10px; margin-top: 10px; justify-content: center; }
        .planner-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--glass-bg); border-radius: 12px; margin-bottom: 10px; border-left: 5px solid #ccc; box-shadow: 0 2px 5px rgba(0,0,0,0.02); transition: transform 0.2s; }
        
        /* TRAFFIC LIGHT COLORS FOR ITEMS */
        .planner-item.status-danger { border-left-color: var(--danger); background: rgba(239, 68, 68, 0.05); }
        .planner-item.status-warning { border-left-color: var(--accent); background: rgba(245, 158, 11, 0.05); }
        .planner-item.status-safe { border-left-color: var(--success); }
        .planner-item.status-paid { border-left-color: var(--text-light); opacity: 0.7; }
        .planner-item.status-refund { border-left-color: #3b82f6; }

        /* FORMS & MODALS */
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-light); margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 12px; border: 2px solid var(--glass-border); border-radius: 10px; font-size: 0.95rem; background: rgba(255,255,255,0.5); color: var(--text-main); font-family: 'Inter', sans-serif; }
        .checkbox-wrapper { display: flex; align-items: center; gap: 10px; padding: 10px; border: 2px solid var(--glass-border); border-radius: 10px; background: rgba(255,255,255,0.2); }
        .checkbox-wrapper input { width: 20px; height: 20px; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); display: flex; justify-content: center; align-items: center; z-index: 200; }
        .modal-content { background: var(--bg-body); color: var(--text-main); width: 800px; max-width: 95%; border-radius: 16px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); padding: 2rem; animation: slideUp 0.3s ease; border: 1px solid var(--glass-border); max-height: 90vh; overflow-y: auto; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .chart-legend-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; margin-top: 15px; font-size: 0.75rem; }
        .legend-item { display: flex; align-items: center; gap: 6px; color: var(--text-main); justify-content: space-between; }
        .legend-color { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        .quick-tags { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 10px; white-space: nowrap; }
        .tag-chip { padding: 8px 16px; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 20px; font-size: 0.85rem; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 6px; }
        .tag-chip:hover { background: var(--primary); color: white; border-color: var(--primary); }

        .import-list-item { padding: 10px; border-bottom: 1px solid var(--glass-border); display: grid; grid-template-columns: 80px 1fr 100px 130px 100px 40px; gap: 10px; align-items: center; font-size: 0.85rem; }
        .import-list-item:last-child { border-bottom: none; }

        @media (max-width: 768px) {
            .col { min-width: 100%; }
            header { padding: 1rem; }
            h1 { font-size: 1.2rem; }
            .btn span { display: none; }
            .btn { padding: 10px; }
            .planner-card-container { flex: 0 0 280px; }
            .import-list-item { display: flex; flex-direction: column; align-items: flex-start; gap: 5px; }
        }
        
        .ozzy-glasses { color: #9b59b6; text-shadow: 0 0 5px rgba(155, 89, 182, 0.5); }
        .badge-ozzy { background-color: #000 !important; color: #fff; border: 1px solid #9b59b6; }
    </style>
</head>
<body data-theme="light"> 

<header>
    <div class="header-title">
        <h1><i class="fa-solid fa-glasses ozzy-glasses"></i> Functus <span class="badge-v3 badge-ozzy">Crazy Train</span></h1>
    </div>

    <div class="header-actions">
        <div id="storageMeter" class="storage-pill" title="Status do Armazenamento Local">
            <i class="fa-solid fa-database"></i> <span id="storageText">0%</span>
        </div>

        <div class="btn-group">
            <button class="btn btn-gold" onclick="app.recommendCard()" title="Mr. Crowley's Choice (Melhor Cartão)">
                <i class="fa-solid fa-bolt"></i>
            </button>
            <button class="btn btn-ghost" onclick="app.showDebtProjection()" title="No More Tears (Fim das Dívidas)">
                <i class="fa-solid fa-hourglass-half"></i>
            </button>
        </div>

        <div class="btn-group">
            <button class="btn btn-primary" onclick="app.openImportModal()" title="Importar Fatura (Vavilov Text)">
                <i class="fa-solid fa-paste"></i> <span class="mobile-hide">Importar</span>
            </button>
            
            <button id="btnBackup" class="btn btn-ghost" onclick="app.exportData()" title="Baixar Backup">
                <i class="fa-solid fa-download"></i>
            </button>
            
            <button class="btn btn-ghost" onclick="document.getElementById('fileInput').click()" title="Restaurar Backup">
                <i class="fa-solid fa-upload"></i>
            </button>
            
            <button class="btn btn-ghost" onclick="app.toggleTheme()" title="Bark at the Moon (Modo Escuro)">
                <i class="fa-solid fa-crow" id="themeIcon"></i>
            </button>
        </div>

        <input type="file" id="fileInput" class="hidden" onchange="app.importData(this)">
    </div>
</header>

<div class="nav-wrapper">
    <div class="nav-container">
        <div class="nav-tab active" onclick="app.switchTab('dashboard')">
            <i class="fa-solid fa-chart-pie"></i> Dashboard
        </div>
        <div class="nav-tab" onclick="app.switchTab('planner')">
            <i class="fa-solid fa-chart-line"></i> Planner
        </div>
        <div class="nav-tab" onclick="app.switchTab('entries')">
            <i class="fa-solid fa-pen-to-square"></i> Lançar
        </div>
        <div class="nav-tab" onclick="app.switchTab('cards')">
            <i class="fa-regular fa-credit-card"></i> Cartões
        </div>
    </div>
</div>

<main id="main-content"></main>

<script src="functus.js"></script>
</body>
</html>
